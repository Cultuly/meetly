server {
    listen 80;
    server_name api.meetly.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.meetly.ru;

    ssl_certificate     /etc/nginx/conf.d/certs/meetly.crt;
    ssl_certificate_key /etc/nginx/conf.d/certs/meetly.key;

    location / {
        proxy_pass http://fastapi:8000/;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}